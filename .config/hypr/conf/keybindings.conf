# Launch terminal
bind = $mainMod, T, exec, $term
# Launch text editor
bind = $mainMod, C, exec, $term nvim
# Launch cava
bind = $mainMod+Ctrl, C, exec, kitty cava
# Start eww script
bind = $mainMod+Ctrl+Shift, C, exec, ~/.config/eww/scripts/start.sh & ~/.config/eww/scripts/cava.sh
# Launch file manager
bind = $mainMod, E, exec, $file
# Launch browser
bind = $mainMod, F, exec, $browser
# Launch system monitor
bind = Ctrl+Shift, Escape, exec, kitty btop
# Launch rofi
bind = $mainMod, A, exec, rofi -show drun


